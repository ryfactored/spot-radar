version: '3.8'

# Minimal Supabase stack for self-hosting on Synology NAS
# Services: PostgreSQL, GoTrue (Auth), PostgREST, Kong (API Gateway), Angular App
# Total RAM: ~400-500MB

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: supabase-db
    restart: unless-stopped
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
      - ./volumes/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./volumes/db/init.sh:/docker-entrypoint-initdb.d/02-init.sh:ro
      - ./volumes/db/03-app.sql:/docker-entrypoint-initdb.d/03-app.sql:ro
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - supabase-network

  # GoTrue - Authentication Service
  auth:
    image: supabase/gotrue:v2.143.0
    container_name: supabase-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres

      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:4200}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}

      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}

      # Email - auto-confirm for simplicity (no SMTP needed)
      GOTRUE_MAILER_AUTOCONFIRM: ${MAILER_AUTOCONFIRM:-true}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@localhost}

      # External OAuth providers (disabled by default)
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_EXTERNAL_PHONE_ENABLED: false
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: false
      GOTRUE_EXTERNAL_GITHUB_ENABLED: false
    networks:
      - supabase-network

  # PostgREST - REST API for PostgreSQL
  rest:
    image: postgrest/postgrest:v12.0.2
    container_name: supabase-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: 'false'
    networks:
      - supabase-network

  # Kong - API Gateway
  kong:
    image: kong:3.4
    container_name: supabase-kong
    restart: unless-stopped
    depends_on:
      - auth
      - rest
    volumes:
      - ./volumes/kong/kong.yml:/var/lib/kong/kong.yml:ro
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    ports:
      - '${KONG_HTTP_PORT:-8001}:8000'
    networks:
      - supabase-network

  # Angular Application
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: angular-app
    restart: unless-stopped
    depends_on:
      - kong
    ports:
      - '${APP_PORT:-4200}:4200'
    environment:
      NODE_ENV: production
    networks:
      - supabase-network

networks:
  supabase-network:
    driver: bridge
