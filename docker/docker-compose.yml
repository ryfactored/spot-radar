services:
  # Angular Application
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: spot-radar-app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-4200}:4200'
    environment:
      NODE_ENV: production
    healthcheck:
      # Hits the SSR server's /health endpoint so a wedged Node process is
      # restarted instead of sitting "up" forever under restart: unless-stopped.
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:4200/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
