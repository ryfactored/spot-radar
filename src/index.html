<!doctype html>
<html lang="en">
  <head>
    <script>
      // Hide landing page during OAuth callbacks to prevent flash while Supabase processes tokens
      if (location.search.includes('code=') || location.hash.includes('access_token')) {
        document.documentElement.style.visibility = 'hidden';
      }
    </script>
    <script>
      // Apply theme before first paint to prevent white flash
      try {
        var t = JSON.parse(localStorage.getItem('angular-starter:theme'));
        if (t) {
          if (t.darkMode) document.documentElement.classList.add('dark-mode');
          if (t.colorTheme) document.documentElement.classList.add('theme-' + t.colorTheme);
        }
      } catch (e) {}
    </script>
    <meta charset="utf-8" />
    <title>Angular Starter</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
