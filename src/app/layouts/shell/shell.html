<a class="skip-link" href="#main-content">Skip to main content</a>
<app-loading-bar />

<mat-sidenav-container class="shell-container">
  <mat-sidenav
    #sidenav
    [mode]="sidenavMode()"
    [opened]="sidenavOpened()"
    role="navigation"
    aria-label="Main navigation"
  >
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/dashboard"
        routerLinkActive="active-link"
        #rlaDashboard="routerLinkActive"
        [attr.aria-current]="rlaDashboard.isActive ? 'page' : null"
      >
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a
        mat-list-item
        routerLink="/notes"
        routerLinkActive="active-link"
        #rlaNotes="routerLinkActive"
        [attr.aria-current]="rlaNotes.isActive ? 'page' : null"
      >
        <mat-icon matListItemIcon>note</mat-icon>
        <span matListItemTitle>Notes</span>
      </a>
      <a
        mat-list-item
        routerLink="/chat"
        routerLinkActive="active-link"
        #rlaChat="routerLinkActive"
        [attr.aria-current]="rlaChat.isActive ? 'page' : null"
      >
        <mat-icon matListItemIcon>chat</mat-icon>
        <span matListItemTitle>Chat</span>
      </a>
      <a
        mat-list-item
        routerLink="/files"
        routerLinkActive="active-link"
        #rlaFiles="routerLinkActive"
        [attr.aria-current]="rlaFiles.isActive ? 'page' : null"
      >
        <mat-icon matListItemIcon>folder</mat-icon>
        <span matListItemTitle>Files</span>
      </a>
      <a
        mat-list-item
        routerLink="/profile"
        routerLinkActive="active-link"
        #rlaProfile="routerLinkActive"
        [attr.aria-current]="rlaProfile.isActive ? 'page' : null"
      >
        <mat-icon matListItemIcon>person</mat-icon>
        <span matListItemTitle>Profile</span>
      </a>
      <a
        mat-list-item
        routerLink="/components"
        routerLinkActive="active-link"
        #rlaComponents="routerLinkActive"
        [attr.aria-current]="rlaComponents.isActive ? 'page' : null"
      >
        <mat-icon matListItemIcon>widgets</mat-icon>
        <span matListItemTitle>Components</span>
      </a>
      @if (isAdmin()) {
        <a
          mat-list-item
          routerLink="/admin"
          routerLinkActive="active-link"
          #rlaAdmin="routerLinkActive"
          [attr.aria-current]="rlaAdmin.isActive ? 'page' : null"
        >
          <mat-icon matListItemIcon>admin_panel_settings</mat-icon>
          <span matListItemTitle>Admin</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="toolbar" color="primary">
      <button mat-icon-button (click)="toggleSidenav()" aria-label="Toggle navigation menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">{{ siteTitle }}</span>
      <span class="spacer"></span>
      <app-theme-picker />
      <a
        routerLink="/profile"
        class="toolbar-avatar"
        matTooltip="Profile"
        aria-label="Go to profile"
      >
        <app-avatar [src]="avatarUrl()" [name]="displayName()" [size]="32" />
      </a>
      <button mat-icon-button (click)="logout()" matTooltip="Logout" aria-label="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main id="main-content" class="content" role="main" [@routeAnimation]="routeKey()">
      <router-outlet (activate)="onActivate()" />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
